<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingua — Translate as you chat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">Lin<span>gua</span>he</div>
    <div class="lang-bar">
      <select class="lang-select" id="fromLang">
        <option value="auto">Detect Language</option>
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="hi">Hindi</option>
        <option value="it">Italian</option>
        <option value="nl">Dutch</option>
        <option value="pl">Polish</option>
        <option value="tr">Turkish</option>
        <option value="vi">Vietnamese</option>
        <option value="tl">Filipino</option>
      </select>
      <button class="swap-btn" id="swapBtn" title="Swap languages">⇄</button>
      <select class="lang-select" id="toLang">
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="hi">Hindi</option>
        <option value="it">Italian</option>
        <option value="nl">Dutch</option>
        <option value="pl">Polish</option>
        <option value="tr">Turkish</option>
        <option value="vi">Vietnamese</option>
        <option value="tl">Filipino</option>
        <option value="en">English</option>
      </select>
    </div>
    <div class="header-actions">
      <button class="history-btn" id="favoritesBtn">♥ Favorites</button>
      <button class="history-btn" id="historyBtn">History</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat" id="chat">
    <div class="empty-state" id="emptyState">
      <div class="glyph">ꦤ</div>
      <p>Type to translate your conversation</p>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <!-- History Panel -->
  <div class="history-panel" id="historyPanel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h2>Translation History</h2>
      <button class="clear-history-btn" id="clearHistoryBtn">🗑 Clear History</button>
      <button class="history-btn" id="historyClose">✕ Close</button>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- Favorites Panel-->
  <div class="history-panel" id="favoritesPanel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h2>♡ Favorite</h2>
      <button class="history-btn" id="favoritesClose">✕ Close</button>
    </div>
    <div id="favoritesList"></div>
  </div>

  <!-- Chips -->
  <div class="chips" id="chips">
    <button class="chip" onclick="useChip(this)">Hello, how are you?</button>
    <button class="chip" onclick="useChip(this)">Where is the bathroom?</button>
    <button class="chip" onclick="useChip(this)">How much does this cost?</button>
    <button class="chip" onclick="useChip(this)">I don't understand</button>
    <button class="chip" onclick="useChip(this)">Thank you very much</button>
    <button class="chip" onclick="useChip(this)">Can you help me?</button>
    <button class="chip" onclick="useChip(this)">Good morning!</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="msgInput" placeholder="Type your message…" rows="2" maxlength="500"></textarea>
      <button class="send-btn" id="sendBtn">Send ↵</button>
    </div>
    <div class="input-footer">
      <div class="auto-detect-label" id="toggleLabel">
        <div class="toggle" id="showOriginalToggle"></div>
        Show original text
      </div>
      <span id="charCount">0 / 500</span>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
// ── State ──
let historyItems = JSON.parse(localStorage.getItem('chatHistory') || '[]'); 
let showOriginal = false;
const MAX_CHARS = 500;
let favorites = JSON.parse(localStorage.getItem('favoriteTranslations') || '[]');

const LANG_NAMES = {
  auto:'Auto-detect', en:'English', es:'Spanish', fr:'French', de:'German',
  zh:'Chinese', ja:'Japanese', ko:'Korean', ar:'Arabic', pt:'Portuguese',
  ru:'Russian', hi:'Hindi', it:'Italian', nl:'Dutch', pl:'Polish',
  tr:'Turkish', vi:'Vietnamese', tl:'Filipino'
};

// ── Elements ──
const chat         = document.getElementById('chat');
const emptyState   = document.getElementById('emptyState');
const typingInd    = document.getElementById('typingIndicator');
const msgInput     = document.getElementById('msgInput');
const sendBtn      = document.getElementById('sendBtn');
const fromLang     = document.getElementById('fromLang');
const toLang       = document.getElementById('toLang');
const swapBtn      = document.getElementById('swapBtn');
const charCount    = document.getElementById('charCount');
const historyBtn   = document.getElementById('historyBtn');
const favoritesBtn   = document.getElementById('favoritesBtn');
const favoritesPanel = document.getElementById('favoritesPanel');
const favoritesClose = document.getElementById('favoritesClose');
const favoritesList  = document.getElementById('favoritesList');
const historyClose = document.getElementById('historyClose');
const historyPanel = document.getElementById('historyPanel');
const historyList  = document.getElementById('historyList');
const clearBtn     = document.getElementById('clearHistoryBtn');
const toggleEl     = document.getElementById('showOriginalToggle');
const toggleLabel  = document.getElementById('toggleLabel');
const toast        = document.getElementById('toast');

// ── Toggle ──
toggleLabel.addEventListener('click', () => {
  showOriginal = !showOriginal;
  toggleEl.classList.toggle('on', showOriginal);
  document.querySelectorAll('.bubble-original').forEach(el => {
    el.style.display = showOriginal ? '' : 'none';
  });
});

// ── Char counter ──
msgInput.addEventListener('input', () => {
  const len = msgInput.value.length;
  charCount.textContent = `${len} / ${MAX_CHARS}`;
  charCount.classList.toggle('warn', len > 450);
  autoResize();
});

function autoResize() {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
}

// ── Send on Enter (Shift+Enter = newline) ──
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

// ── Swap Languages ──
swapBtn.addEventListener('click', () => {
  const from = fromLang.value === 'auto' ? 'en' : fromLang.value;
  const to = toLang.value;
  // Animate
  swapBtn.style.transform = 'rotate(180deg)';
  setTimeout(() => swapBtn.style.transform = '', 300);
  setSelectValue(fromLang, to);
  setSelectValue(toLang, from);
});

function setSelectValue(select, val) {
  const opt = [...select.options].find(o => o.value === val);
  if (opt) select.value = val;
}

// ── Chip Random ──
function useChip(btn) {
  msgInput.value = btn.textContent;
  autoResize();
  charCount.textContent = `${btn.textContent.length} / ${MAX_CHARS}`;
  msgInput.focus();
}

// ── History ──
historyBtn.addEventListener('click', () => {
  renderHistoryList();
  historyPanel.classList.add('open');
});
historyClose.addEventListener('click', () => historyPanel.classList.remove('open'));

clearBtn.addEventListener('click', () => {
  if (confirm('Clear all translation history?')) {
    historyItems = [];
    localStorage.setItem('chatHistory', '[]');
    renderHistoryList();
    showToast('History cleared');
  }
});

function renderHistoryList() {
  if (historyItems.length === 0) {
    historyList.innerHTML = '<p class="history-empty">No translations yet.</p>';
    return;
  }
  // Newest first (already stored newest-first via unshift)
  historyList.innerHTML = historyItems.map((item, i) => `
    <div class="history-item" onclick="reuseHistory(${i})">
      <div class="hi-original">${escHtml(item.orig)}</div>
      <div class="hi-translation">${escHtml(item.trans)}</div>
      <div class="hi-meta">${escHtml(item.fromL)} → ${escHtml(item.toL)} · ${item.time || ''}</div>
    </div>
  `).join('');
}

function renderFavorites() {

  if (favorites.length === 0) {
    favoritesList.innerHTML =
      '<p class="history-empty">No favorites yet.</p>';
    return;
  }

  favoritesList.innerHTML = favorites.map((item, i) => `
    <div class="history-item">

      <div class="hi-original">${escHtml(item.orig)}</div>

      <div class="hi-translation">${escHtml(item.trans)}</div>

      <div class="hi-meta">${item.time}</div>

      <button class="bubble-action"
        onclick="removeFavorite(${i})">
        🗑 Remove
      </button>

    </div>
  `).join('');

}

function removeFavorite(index) {

  favorites.splice(index, 1);

  localStorage.setItem(
    'favoriteTranslations',
    JSON.stringify(favorites)
  );

  renderFavorites();

  showToast("Favorite removed");

}

function reuseHistory(idx) {
  const item = historyItems[idx];
  msgInput.value = item.orig;
  setSelectValue(fromLang, item.fromCode || 'auto');
  setSelectValue(toLang, item.toCode || 'en');
  autoResize();
  charCount.textContent = `${item.orig.length} / ${MAX_CHARS}`;
  historyPanel.classList.remove('open');
  msgInput.focus();
}

// ── Main translate ──
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || sendBtn.disabled) return;

  const from = fromLang.value;
  const to = toLang.value;

  // Show user bubble
  hideEmpty();
  appendUserBubble(text);
  msgInput.value = '';
  msgInput.style.height = '';
  charCount.textContent = '0 / 500';
  charCount.classList.remove('warn');

  sendBtn.disabled = true;
  showTyping();

  try {
    const result = await callGoogleTranslate(text, from, to);
    hideTyping();
    appendAssistantBubble(result, text, from, to);

    // Save history — newest first, matches your schema
    const fromLabel = from === 'auto'
      ? (result.detectedLang || 'Auto') : (LANG_NAMES[from] || from);
    const toLabel = LANG_NAMES[to] || to;
    const entry = {
      orig: text,
      trans: result.translation,
      fromL: fromLabel,
      toL: toLabel,
      fromCode: from === 'auto' ? (result.detectedCode || 'auto') : from,
      toCode: to,
      time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
    };
    historyItems.unshift(entry);
    if (historyItems.length > 100) historyItems.pop();
    localStorage.setItem('chatHistory', JSON.stringify(historyItems));

  } catch(err) {
    hideTyping();
    appendError(err.message || 'Translation failed. Please try again.');
  }
  sendBtn.disabled = false;
}


// MyMemory language code map (ISO 639-1 → MyMemory locale format)
const MYMEMORY_CODES = {
  en:'en-US', es:'es-ES', fr:'fr-FR', de:'de-DE', zh:'zh-CN',
  ja:'ja-JP', ko:'ko-KR', ar:'ar-SA', pt:'pt-PT', ru:'ru-RU',
  hi:'hi-IN', it:'it-IT', nl:'nl-NL', pl:'pl-PL', tr:'tr-TR',
  vi:'vi-VN', tl:'tl-PH'
};

const LANG_NAMES_BY_CODE = Object.fromEntries(
  Object.entries({'en-US':'English','es-ES':'Spanish','fr-FR':'French','de-DE':'German',
    'zh-CN':'Chinese','ja-JP':'Japanese','ko-KR':'Korean','ar-SA':'Arabic',
    'pt-PT':'Portuguese','ru-RU':'Russian','hi-IN':'Hindi','it-IT':'Italian',
    'nl-NL':'Dutch','pl-PL':'Polish','tr-TR':'Turkish','vi-VN':'Vietnamese','tl-PH':'Filipino'})
);

async function callGoogleTranslate(text, from, to) {
  // MyMemory uses 'autodetect' for auto-detection, and specific locale codes for some languages
  const fromCode = (from === 'auto') ? 'autodetect' : (MYMEMORY_CODES[from] || from);
  const toCode   = MYMEMORY_CODES[to] || to;

  const langpair = (from === 'auto') ? `autodetect|${toCode}` : `${fromCode}|${toCode}`;
  const url = `https://api.mymemory.translated.net/get?q=${
  encodeURIComponent(text)}&langpair=${encodeURIComponent(langpair)}`;


  const response = await fetch(url);
  if (!response.ok) throw new Error(`MyMemory API error ${response.status}`);

  const data = await response.json();

  if (data.responseStatus !== 200) {
    throw new Error(data.responseDetails || 'Translation failed');
  }

  const translation = data.responseData.translatedText;

  // MyMemory returns detected language in match objects when auto-detecting
  let detectedLang = null;
  let detectedCode = null;
  if (from === 'auto' && data.matches && data.matches.length > 0) {
    const seg = data.matches[0].segment;
    // Try to get source from responseData
    const rawSource = data.responseData.detectedLanguage || '';
    if (rawSource) {
      detectedCode = rawSource.split('|')[0].split('-')[0].toLowerCase();
      detectedLang = LANG_NAMES[detectedCode] || rawSource;
    }
  }

  return {
    translation,
    detectedLang,
    detectedCode,
    note: ''
  };
}

// ── DOM helpers ──
function hideEmpty() {
  emptyState.style.display = 'none';
}

function showTyping() {
  typingInd.classList.add('visible');
  chat.appendChild(typingInd);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() {
  typingInd.classList.remove('visible');
}

function appendUserBubble(text) {
  const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const el = document.createElement('div');
  el.className = 'message user';
  el.innerHTML = `
    <div class="bubble">${escHtml(text)}</div>
    <div class="timestamp">${now}</div>
  `;
  chat.insertBefore(el, typingInd);
  chat.scrollTop = chat.scrollHeight;
}

// Shows the assistant's translation bubble, with optional detected language and note
function appendAssistantBubble(result, originalText, fromCode, toCode) {
  const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const from = fromCode === 'auto' ? 'auto' : fromCode;
  const detectedLabel = (from === 'auto' && result.detectedLang)
    ? `<span class="detected-badge">Detected: ${result.detectedLang}</span><br>` : '';

    // Show language tags, e.g. "English → French"
  const fromLabel = from === 'auto'
    ? (result.detectedLang || 'Auto') : (LANG_NAMES[from] || from);
  const toLabel = LANG_NAMES[toCode] || toCode;

  // Optional note (e.g. "This is a formal translation")
  const note = result.note
    ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;font-style:italic;">💡 ${escHtml(result.note)}</div>` : '';

  const el = document.createElement('div');
  el.className = 'message assistant';
  el.innerHTML = `
  <div class="bubble-lang-tag">${fromLabel} → ${toLabel}</div>

  <div class="bubble">

    ${detectedLabel}

    <div class="bubble-translation">${escHtml(result.translation)}</div>

    <div class="bubble-original" style="display:${showOriginal ? '' : 'none'}">
      ${escHtml(originalText)}
    </div>

    <div class="bubble-actions">
      <button class="bubble-action" 
        onclick="copyText(this,'${escHtml(result.translation)}')">
        📋 Copy
      </button>

      <button class="bubble-action"
        onclick="favoriteTranslation(this)"
        data-orig="${escHtml(originalText)}"
        data-trans="${escHtml(result.translation)}">
        ♡ Favorite
      </button>

    </div>
    

    ${note}

  </div>

  <div class="timestamp">${now}</div>
`;
  chat.insertBefore(el, typingInd);
  chat.scrollTop = chat.scrollHeight;
}

// For displaying errors in the chat
function appendError(msg) {
  const el = document.createElement('div');
  el.className = 'message assistant';
  el.innerHTML = `
    <div class="bubble" style="border-color:#c0504a44;color:#c0504a;">⚠ ${escHtml(msg)}</div>
  `;
  chat.insertBefore(el, typingInd);
  chat.scrollTop = chat.scrollHeight;
}

// ── Utilities ──
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Copy to clipboard
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = '⧉ Copy', 2000);
    showToast('Copied to clipboard');
  });
}

// Text-to-speech
function speakText(text, langCode) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = langCode || 'en';
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

// Toast notification
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function favoriteTranslation(btn) {

  const original = btn.dataset.orig;
  const translation = btn.dataset.trans;

  const item = {
    orig: original,
    trans: translation,
    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  };

  favorites.unshift(item);

  if (favorites.length > 50) favorites.pop();

  localStorage.setItem('favoriteTranslations', JSON.stringify(favorites));

  btn.textContent = "♥️ Saved";

  showToast("Added to favorites");
}

favoritesBtn.addEventListener('click', () => {
  renderFavorites();
  favoritesPanel.classList.add('open');
});

favoritesClose.addEventListener('click', () => {
  favoritesPanel.classList.remove('open');
});

// Render saved history on load
renderHistoryList();
</script>
</body>
</html>
